<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Хмарна Лабораторна</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(231, 225, 225, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }
        .badge {
            background: #38bdf8;
            color: #0f172a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 { font-size: 2.2rem; margin-bottom: 15px; background: linear-gradient(to right, #1691c6, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 25px; }
        .main-img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .footer-info {
            font-size: 14px;
            color: #4ade80;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">CI/CD Pipeline Active</span>
        <h1>See you again in Cloud</h1>
        
       <!-- Локальна картинка з папки -->
        <img src="vin.jpg" alt="See you again" class="main-img">
        
        <p>Проект автоматично оновлено через <b>GitHub Actions</b> та <b></b>.</p>
        
        <div class="footer-info">
            Статус: Працює стабільно • Останній заїзд
        </div>
    </div>
</body>
</html>
