name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Срабатывает, когда ты делаешь Push в GitHub Desktop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app  # Мы указываем папку app, где лежит наш Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aws-lab5-app:latest